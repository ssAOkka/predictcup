version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: predictcup_postgres
    environment:
      POSTGRES_USER: predictcup
      POSTGRES_PASSWORD: predictcup
      POSTGRES_DB: predictcup
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predictcup"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - predictcup_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: predictcup_backend
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://predictcup:predictcup@postgres:5432/predictcup
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-production
      JWT_REFRESH_EXPIRES_IN: 30d
      FOOTBALL_API_PROVIDER: football-data.org
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      EMAIL_PROVIDER: nodemailer
      EMAIL_FROM: noreply@predictcup.dev
      CORS_ORIGIN: http://localhost:5173
      WS_URL: http://localhost:3000
      LOG_LEVEL: debug
      ADMIN_EMAIL: admin@predictcup.dev
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_USERNAME: admin
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    networks:
      - predictcup_network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: predictcup_frontend
    environment:
      VITE_API_URL: http://localhost:3000
      VITE_WS_URL: http://localhost:3000
      VITE_APP_NAME: PredictCup
      VITE_DEFAULT_LANGUAGE: en
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - predictcup_network
    command: npm run dev

volumes:
  postgres_data:

networks:
  predictcup_network:
    driver: bridge
